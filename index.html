<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SecureStudy — 정보보안기사 30일</title>
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SecureStudy" />
  <meta name="description" content="정보보안기사 자격증 30일 완성 학습 앱" />
  <link id="manifest-link" rel="manifest" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0f1e'/%3E%3Ctext x='90' y='118' font-size='80' text-anchor='middle'%3E%F0%9F%94%90%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f1e; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
      --accent: #3b82f6; --text: #e8eaf0; --muted: #8892a4;
      --green: #4ade80; --red: #f87171;
      --safe-top: env(safe-area-inset-top,0px); --safe-bot: env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:0;
      background-image: linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);
      background-size:44px 44px; pointer-events:none; }
    .orb1,.orb2 { position:fixed; border-radius:50%; pointer-events:none; z-index:0; }
    .orb1 { top:-15%; right:-10%; width:500px; height:500px; background:radial-gradient(circle,rgba(59,130,246,0.14) 0%,transparent 65%); }
    .orb2 { bottom:-15%; left:-10%; width:600px; height:600px; background:radial-gradient(circle,rgba(139,92,246,0.09) 0%,transparent 65%); }
    #app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 40px); min-height:100dvh; }

    .badge { display:inline-flex; align-items:center; gap:6px; background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.3); border-radius:20px; padding:5px 14px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    .fade-up { animation:fadeUp .4s ease both; }
    .pop-in { animation:popIn .3s ease both; }

    .app-header { text-align:center; padding:20px 0 28px; }
    .app-title { font-size:30px; font-weight:900; letter-spacing:-1px; background:linear-gradient(135deg,#fff 20%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:12px 0 6px; }
    .app-subtitle { color:var(--muted); font-size:13px; }

    .progress-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:20px; }
    .progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .progress-label { font-size:13px; color:var(--muted); }
    .progress-count { font-size:13px; color:var(--accent); font-weight:700; }
    .progress-track { height:6px; background:rgba(255,255,255,0.07); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#2563eb,#60a5fa); transition:width .6s cubic-bezier(.4,0,.2,1); }

    /* Week tabs */
    .week-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
    .week-tabs::-webkit-scrollbar { display:none; }
    .week-tab { flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--muted); transition:all .2s; white-space:nowrap; font-family:inherit; }
    .week-tab.active { background:rgba(59,130,246,0.2); border-color:rgba(59,130,246,0.4); color:var(--accent); }

    .today-card { background:linear-gradient(135deg,rgba(37,99,235,0.22) 0%,rgba(59,130,246,0.1) 100%); border:1px solid rgba(59,130,246,0.4); border-radius:22px; padding:24px; cursor:pointer; position:relative; overflow:hidden; transition:transform .2s; -webkit-tap-highlight-color:transparent; }
    .today-card:active { transform:scale(.98); }
    .today-chip { position:absolute; top:16px; right:16px; font-size:10px; color:var(--accent); background:rgba(59,130,246,0.18); border:1px solid rgba(59,130,246,0.3); padding:3px 10px; border-radius:20px; letter-spacing:1px; }
    .today-emoji { font-size:40px; margin-bottom:14px; display:block; }
    .today-category { font-size:11px; color:#6b9fd4; margin-bottom:6px; letter-spacing:.5px; }
    .today-title { font-size:19px; font-weight:800; margin-bottom:16px; line-height:1.3; }
    .tag { display:inline-block; background:rgba(59,130,246,0.18); border:1px solid rgba(59,130,246,0.28); border-radius:20px; padding:3px 10px; font-size:11px; color:var(--accent); margin:0 4px 4px 0; }
    .done-badge { display:flex; align-items:center; gap:5px; color:var(--green); font-size:13px; font-weight:700; margin-top:14px; }

    .section-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); font-weight:600; margin:22px 0 10px; }
    .day-list { display:flex; flex-direction:column; gap:8px; }
    .day-item { display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:13px 15px; cursor:pointer; transition:background .18s; -webkit-tap-highlight-color:transparent; }
    .day-item.today { background:rgba(37,99,235,0.08); border-color:rgba(59,130,246,0.28); }
    .day-item:active { background:rgba(255,255,255,0.06); }
    .day-icon { width:38px; height:38px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; background:rgba(255,255,255,0.05); }
    .day-icon.done { background:rgba(74,222,128,0.12); font-size:16px; }
    .day-info { flex:1; min-width:0; }
    .day-title { font-size:13px; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-title.done-text { color:#4b5563; }
    .day-cat { font-size:11px; color:#3b4a5c; }
    .day-num { font-size:11px; flex-shrink:0; }
    .day-num.today-num { color:var(--accent); }
    .day-num.other { color:#3b4a5c; }

    /* Study view */
    .back-row { display:flex; align-items:center; gap:10px; margin-bottom:22px; padding-top:6px; flex-wrap:wrap; }
    .back-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text); border-radius:10px; padding:8px 13px; cursor:pointer; font-size:13px; font-family:inherit; display:flex; align-items:center; gap:4px; -webkit-tap-highlight-color:transparent; }
    .back-btn:active { background:rgba(255,255,255,0.1); }
    .complete-chip { font-size:11px; color:var(--green); background:rgba(74,222,128,0.1); padding:4px 12px; border-radius:20px; margin-left:auto; }

    .study-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; margin-bottom:14px; }
    .study-cat { font-size:11px; color:#6b9fd4; margin-bottom:8px; letter-spacing:.5px; }
    .study-title { font-size:20px; font-weight:800; margin-bottom:20px; line-height:1.3; }
    .content-body { font-size:14px; line-height:1.85; color:#c8cdd8; }
    .content-heading { font-weight:800; color:var(--text); margin-top:16px; margin-bottom:4px; font-size:13px; letter-spacing:.3px; }
    .content-bullet { display:flex; gap:8px; margin-bottom:4px; padding-left:4px; }
    .bullet-dot { color:var(--accent); flex-shrink:0; }
    .keywords-row { margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.06); }
    .keywords-label { font-size:10px; color:var(--muted); margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }

    .quiz-btn { width:100%; padding:16px; background:linear-gradient(135deg,#1d4ed8,#3b82f6); border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:.3px; -webkit-tap-highlight-color:transparent; transition:opacity .2s; }
    .quiz-btn:active { opacity:.85; }
    .quiz-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:22px; }
    .quiz-section-label { font-size:10px; color:var(--muted); margin-bottom:12px; letter-spacing:1px; text-transform:uppercase; }
    .quiz-question { font-size:15px; font-weight:700; margin-bottom:18px; line-height:1.5; color:var(--text); }
    .quiz-options { display:flex; flex-direction:column; gap:9px; }
    .quiz-option { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:13px 15px; color:#c8cdd8; font-size:14px; text-align:left; cursor:pointer; transition:all .2s; font-family:inherit; -webkit-tap-highlight-color:transparent; }
    .quiz-option.correct { background:rgba(74,222,128,0.12); border-color:rgba(74,222,128,0.4); color:var(--green); }
    .quiz-option.wrong { background:rgba(239,68,68,0.12); border-color:rgba(239,68,68,0.4); color:var(--red); }
    .opt-num { width:26px; height:26px; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
    .quiz-result { margin-top:14px; padding:14px; border-radius:12px; font-size:14px; font-weight:700; }
    .quiz-result.ok { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.3); color:var(--green); }
    .quiz-result.ng { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:var(--red); }
    .manual-done-btn { margin-top:10px; width:100%; padding:13px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#c8cdd8; font-size:13px; cursor:pointer; font-family:inherit; }

    #install-banner { display:none; position:fixed; bottom:calc(var(--safe-bot) + 12px); left:16px; right:16px; background:rgba(15,23,42,0.95); backdrop-filter:blur(12px); border:1px solid rgba(59,130,246,0.35); border-radius:16px; padding:14px 16px; z-index:100; flex-direction:column; gap:10px; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    #install-banner.show { display:flex; }
    .install-text { font-size:13px; color:var(--text); font-weight:600; }
    .install-sub { font-size:12px; color:var(--muted); margin-top:2px; }
    .install-actions { display:flex; gap:8px; }
    .install-ok { flex:1; padding:10px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .install-dismiss { padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--muted); font-size:13px; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div id="app"></div>

<div id="install-banner">
  <div>
    <div class="install-text">🔐 홈 화면에 추가하기</div>
    <div class="install-sub">앱처럼 바로 실행할 수 있어요</div>
  </div>
  <div class="install-actions">
    <button class="install-ok" id="install-ok-btn">설치하기</button>
    <button class="install-dismiss" id="install-dismiss-btn">나중에</button>
  </div>
</div>

<script>
const STUDY_DATA = [
  // ── WEEK 1: 암호학 ──────────────────────────────────────
  {
    day:1, category:"암호학 기초", emoji:"🔐", title:"대칭키 vs 비대칭키 암호화",
    content:[
      {type:"h",text:"대칭키 암호화 (Symmetric Key)"},
      {type:"b",text:"암호화와 복호화에 동일한 키 사용"},
      {type:"b",text:"속도가 빠르고 대용량 데이터에 적합"},
      {type:"b",text:"대표 알고리즘: AES, DES, 3DES, ARIA"},
      {type:"b",text:"문제점: 키 배송 문제 (Key Distribution Problem)"},
      {type:"h",text:"비대칭키 암호화 (Asymmetric Key)"},
      {type:"b",text:"공개키(Public Key)와 개인키(Private Key) 쌍 사용"},
      {type:"b",text:"공개키로 암호화 → 개인키로 복호화"},
      {type:"b",text:"대표 알고리즘: RSA, ECC, ElGamal"},
      {type:"b",text:"속도 느리지만 키 배송 문제 해결"},
    ],
    keywords:["AES","RSA","대칭키","비대칭키","공개키","개인키"],
    quiz:{q:"키 배송 문제를 해결하기 위해 사용하는 암호화 방식은?",opts:["대칭키 암호화","비대칭키 암호화","해시 함수","스트림 암호"],ans:1}
  },
  {
    day:2, category:"암호학 기초", emoji:"🔢", title:"블록 암호 운용 모드 (ECB, CBC, CTR)",
    content:[
      {type:"h",text:"ECB (Electronic Codebook)"},
      {type:"b",text:"각 블록을 독립적으로 암호화"},
      {type:"b",text:"같은 평문 → 같은 암호문 (패턴 노출 취약)"},
      {type:"b",text:"병렬 처리 가능하나 보안성 낮음"},
      {type:"h",text:"CBC (Cipher Block Chaining)"},
      {type:"b",text:"이전 암호문 블록과 XOR 후 암호화"},
      {type:"b",text:"IV(초기화 벡터) 필요"},
      {type:"b",text:"패턴 숨김 가능, 가장 널리 사용"},
      {type:"h",text:"CTR (Counter Mode)"},
      {type:"b",text:"카운터 값을 암호화 후 평문과 XOR"},
      {type:"b",text:"병렬 처리 가능, 스트림 암호처럼 동작"},
      {type:"b",text:"임의 접근(Random Access) 가능"},
    ],
    keywords:["ECB","CBC","CTR","IV","블록 암호","운용 모드"],
    quiz:{q:"이전 암호문 블록과 XOR하여 암호화하는 블록 암호 운용 모드는?",opts:["ECB","CBC","CTR","OFB"],ans:1}
  },
  {
    day:3, category:"암호학 심화", emoji:"🔑", title:"해시 함수와 전자서명",
    content:[
      {type:"h",text:"해시 함수 (Hash Function)"},
      {type:"b",text:"임의 길이 입력 → 고정 길이 출력"},
      {type:"b",text:"일방향성: 역산 불가"},
      {type:"b",text:"충돌 저항성: 같은 해시값 두 입력 찾기 어려움"},
      {type:"b",text:"주요 알고리즘: MD5(128bit), SHA-1(160bit), SHA-256, SHA-3"},
      {type:"h",text:"전자서명 (Digital Signature)"},
      {type:"b",text:"서명: 송신자 개인키로 메시지 해시값 암호화"},
      {type:"b",text:"검증: 송신자 공개키로 복호화 후 해시값 비교"},
      {type:"b",text:"무결성 + 인증 + 부인방지(Non-Repudiation) 제공"},
      {type:"h",text:"MAC (Message Authentication Code)"},
      {type:"b",text:"대칭키 기반 메시지 인증 / HMAC: 해시 + 비밀키"},
      {type:"b",text:"부인방지 기능 없음"},
    ],
    keywords:["SHA-256","MD5","전자서명","HMAC","부인방지","무결성"],
    quiz:{q:"전자서명에서 서명 생성 시 사용하는 키는?",opts:["수신자 공개키","수신자 개인키","송신자 공개키","송신자 개인키"],ans:3}
  },
  {
    day:4, category:"암호학 심화", emoji:"🤝", title:"키 교환 프로토콜 (Diffie-Hellman, PKI)",
    content:[
      {type:"h",text:"Diffie-Hellman 키 교환"},
      {type:"b",text:"공개 채널에서 안전하게 비밀 키 합의"},
      {type:"b",text:"이산 로그 문제의 어려움에 기반"},
      {type:"b",text:"중간자 공격(MITM)에 취약 → 인증 필요"},
      {type:"h",text:"PKI (공개키 기반 구조)"},
      {type:"b",text:"인증기관(CA)이 공개키의 유효성 보증"},
      {type:"b",text:"디지털 인증서: 공개키 + 소유자 정보 + CA 서명"},
      {type:"b",text:"인증서 폐기: CRL(인증서 폐기 목록), OCSP"},
      {type:"h",text:"인증서 계층 구조"},
      {type:"b",text:"루트 CA → 중간 CA → 서버 인증서"},
      {type:"b",text:"신뢰 체인(Chain of Trust) 형성"},
    ],
    keywords:["Diffie-Hellman","PKI","CA","디지털 인증서","CRL","OCSP"],
    quiz:{q:"공개 채널에서 비밀 키를 안전하게 합의하는 프로토콜은?",opts:["RSA","Diffie-Hellman","AES","SHA-256"],ans:1}
  },
  {
    day:5, category:"암호학 응용", emoji:"🌐", title:"SSL/TLS 프로토콜",
    content:[
      {type:"h",text:"SSL/TLS 개요"},
      {type:"b",text:"전송 계층 보안 프로토콜 (L4-L7)"},
      {type:"b",text:"기밀성, 무결성, 인증 제공"},
      {type:"b",text:"HTTPS = HTTP + TLS"},
      {type:"h",text:"TLS 핸드셰이크 과정"},
      {type:"b",text:"1. Client Hello: 지원 암호 스위트 전송"},
      {type:"b",text:"2. Server Hello: 암호 스위트 선택 + 인증서 전송"},
      {type:"b",text:"3. 키 교환 (Diffie-Hellman 또는 RSA)"},
      {type:"b",text:"4. 세션 키 생성 후 암호화 통신 시작"},
      {type:"h",text:"TLS 버전"},
      {type:"b",text:"TLS 1.2: 현재 주로 사용"},
      {type:"b",text:"TLS 1.3: 핸드셰이크 단순화, 속도 향상"},
      {type:"b",text:"SSL 3.0 이하: POODLE 취약점으로 사용 금지"},
    ],
    keywords:["TLS","SSL","HTTPS","핸드셰이크","암호 스위트","세션 키"],
    quiz:{q:"TLS 핸드셰이크에서 클라이언트가 가장 먼저 하는 것은?",opts:["인증서 검증","세션 키 생성","Client Hello 전송","데이터 암호화"],ans:2}
  },
  {
    day:6, category:"암호학 응용", emoji:"🎲", title:"난수 생성과 암호학적 응용",

// ─── STATE ──────────────────────────────────────────────
let completedDays = [];
try { completedDays = JSON.parse(localStorage.getItem('ss30_completed') || '[]'); } catch {}

let currentView = 'home';
let selectedDay = null;
let quizAnswered = null;
let selectedOption = null;
let showQuiz = false;
let activeWeek = 0; // 0=전체, 1~5=주차

const todayIdx = (() => {
  const start = new Date('2025-01-01');
  const now = new Date();
  const diff = Math.floor((now - start) / 86400000);
  return diff % STUDY_DATA.length;
})();

function saveCompleted() {
  try { localStorage.setItem('ss30_completed', JSON.stringify(completedDays)); } catch {}
}
function markComplete(idx) {
  if (!completedDays.includes(idx)) { completedDays.push(idx); saveCompleted(); }
}

// ─── RENDER ─────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = currentView === 'home' ? renderHome() : renderStudy();
  bindEvents();
}

function getWeekDays() {
  if (activeWeek === 0) return STUDY_DATA;
  const start = (activeWeek - 1) * 7;
  return STUDY_DATA.slice(start, start + 7);
}

function renderHome() {
  const done = completedDays.length;
  const total = STUDY_DATA.length;
  const pct = Math.round((done / total) * 100);
  const today = STUDY_DATA[todayIdx];
  const weekDays = getWeekDays();

  const weekTabs = ['전체', '1주차 암호학', '2주차 네트워크', '3주차 시스템', '4주차 웹·관리'].map((label, i) =>
    `<button class="week-tab ${activeWeek === i ? 'active' : ''}" data-week="${i}">${label}</button>`
  ).join('');

  const dayItems = weekDays.map(item => {
    const idx = item.day - 1;
    const isDone = completedDays.includes(idx);
    const isToday = idx === todayIdx;
    return `
      <div class="day-item ${isToday ? 'today' : ''}" data-open="${idx}">
        <div class="day-icon ${isDone ? 'done' : ''}">${isDone ? '✓' : item.emoji}</div>
        <div class="day-info">
          <div class="day-title ${isDone ? 'done-text' : ''}">${item.title}</div>
          <div class="day-cat">${item.category}</div>
        </div>
        <div class="day-num ${isToday ? 'today-num' : 'other'}">${isToday ? '오늘' : 'Day ' + item.day}</div>
      </div>`;
  }).join('');

  return `
    <div class="app-header fade-up">
      <div class="badge"><span class="badge-dot"></span>정보보안기사 30일 완성</div>
      <div class="app-title">SecureStudy</div>
      <div class="app-subtitle">매일 한 챕터씩 · 30일 후엔 합격</div>
    </div>

    <div class="progress-card fade-up" style="animation-delay:.05s">
      <div class="progress-row">
        <span class="progress-label">전체 진행률</span>
        <span class="progress-count">${done} / ${total} 완료 (${pct}%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="section-label fade-up" style="animation-delay:.07s;margin-top:0">오늘의 학습</div>
    <div class="today-card fade-up" data-open="${todayIdx}" style="animation-delay:.09s">
      <span class="today-chip">DAY ${todayIdx + 1}</span>
      <span class="today-emoji">${today.emoji}</span>
      <div class="today-category">${today.category}</div>
      <div class="today-title">${today.title}</div>
      <div>${today.keywords.slice(0,3).map(k=>`<span class="tag">${k}</span>`).join('')}</div>
      ${completedDays.includes(todayIdx) ? '<div class="done-badge"><span>✓</span> 학습 완료</div>' : ''}
    </div>

    <div class="section-label fade-up" style="animation-delay:.11s">주차별 커리큘럼</div>
    <div class="week-tabs fade-up" style="animation-delay:.12s">${weekTabs}</div>
    <div class="day-list fade-up" style="animation-delay:.13s">${dayItems}</div>
  `;
}

function renderStudy() {
  const data = STUDY_DATA[selectedDay];
  const isDone = completedDays.includes(selectedDay);

  const contentHtml = data.content.map(line => {
    if (line.type === 'h') return `<div class="content-heading">${line.text}</div>`;
    return `<div class="content-bullet"><span class="bullet-dot">·</span><span>${line.text}</span></div>`;
  }).join('');

  const quizHtml = !showQuiz
    ? `<button class="quiz-btn" id="open-quiz-btn">📝 학습 확인 퀴즈 풀기</button>`
    : `<div class="quiz-card pop-in">
        <div class="quiz-section-label">오늘의 퀴즈</div>
        <div class="quiz-question">${data.quiz.q}</div>
        <div class="quiz-options">
          ${data.quiz.opts.map((opt,i) => {
            let cls = '';
            if (quizAnswered !== null) {
              if (i === data.quiz.ans) cls = 'correct';
              else if (i === selectedOption) cls = 'wrong';
            }
            return `<button class="quiz-option ${cls}" data-opt="${i}" ${quizAnswered !== null ? 'disabled' : ''}>
              <span class="opt-num">${['①','②','③','④'][i]}</span>${opt}
            </button>`;
          }).join('')}
        </div>
        ${quizAnswered !== null ? `
          <div class="quiz-result ${quizAnswered === data.quiz.ans ? 'ok' : 'ng'}">
            ${quizAnswered === data.quiz.ans
              ? '🎉 정답! 오늘 학습 완료예요.'
              : `❌ 틀렸어요. 정답: '${data.quiz.opts[data.quiz.ans]}'`}
          </div>
          ${!isDone && quizAnswered !== data.quiz.ans
            ? `<button class="manual-done-btn" id="manual-done-btn">내용은 이해했어요 — 완료로 표시</button>` : ''}
        ` : ''}
      </div>`;

  return `
    <div class="back-row fade-up">
      <button class="back-btn" id="back-btn">← 목록</button>
      <div class="badge" style="font-size:10px;padding:4px 12px">DAY ${selectedDay + 1}</div>
      ${isDone ? '<div class="complete-chip">✓ 완료</div>' : ''}
    </div>
    <div class="study-card fade-up" style="animation-delay:.05s">
      <div class="study-cat">${data.category}</div>
      <div class="study-title">${data.emoji} ${data.title}</div>
      <div class="content-body">${contentHtml}</div>
      <div class="keywords-row">
        <div class="keywords-label">핵심 키워드</div>
        <div>${data.keywords.map(k=>`<span class="tag">${k}</span>`).join('')}</div>
      </div>
    </div>
    ${quizHtml}
  `;
}

function bindEvents() {
  document.querySelectorAll('[data-open]').forEach(el => {
    el.addEventListener('click', () => {
      selectedDay = parseInt(el.dataset.open);
      quizAnswered = null; selectedOption = null; showQuiz = false;
      currentView = 'study'; render(); window.scrollTo(0,0);
    });
  });
  document.querySelectorAll('[data-week]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeWeek = parseInt(btn.dataset.week); render();
    });
  });
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', () => {
    currentView = 'home'; showQuiz = false; render(); window.scrollTo(0,0);
  });
  const openQuiz = document.getElementById('open-quiz-btn');
  if (openQuiz) openQuiz.addEventListener('click', () => { showQuiz = true; render(); });
  document.querySelectorAll('[data-opt]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (quizAnswered !== null) return;
      const i = parseInt(btn.dataset.opt);
      selectedOption = i; quizAnswered = i;
      if (i === STUDY_DATA[selectedDay].quiz.ans) markComplete(selectedDay);
      render();
    });
  });
  const manualBtn = document.getElementById('manual-done-btn');
  if (manualBtn) manualBtn.addEventListener('click', () => { markComplete(selectedDay); render(); });
}

  ]
};
document.getElementById('manifest-link').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));

// ─── Service Worker ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  const sw = `const C='ss30-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),{scope:'./'});
}

// ─── Install Prompt ──────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; banner.classList.add('show'); });
document.getElementById('install-ok-btn').addEventListener('click', () => { banner.classList.remove('show'); if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;} });
document.getElementById('install-dismiss-btn').addEventListener('click', () => banner.classList.remove('show'));

render();
</script>
